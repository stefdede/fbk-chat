<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBKConseils — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --red: #e63312; --red-dark: #c42a0e; --bg: #f7f7f5; --white: #ffffff; --dark: #1a1a1a; --gray: #6b7280; --border: #e5e7eb; --radius: 18px; --radius-sm: 10px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); flex-shrink: 0; }
    .header-avatar { width: 42px; height: 42px; background: var(--red); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .header-info { flex: 1; }
    .header-name { font-size: 15px; font-weight: 700; color: var(--dark); letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--gray); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
    .online-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .header-logo { font-size: 11px; font-weight: 600; color: var(--red); letter-spacing: 1px; text-transform: uppercase; border: 1.5px solid var(--red); padding: 3px 8px; border-radius: 6px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: var(--red); }
    .msg-avatar.user-av { background: var(--dark); font-size: 11px; font-weight: 600; color: white; }
    .bubble { max-width: 75%; padding: 11px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.55; color: var(--dark); }
    .bubble.bot { background: var(--white); border-bottom-left-radius: var(--radius-sm); box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .bubble.user { background: var(--red); color: white; border-bottom-right-radius: var(--radius-sm); }
    .bubble a { color: var(--red); font-weight: 600; text-decoration: none; border-bottom: 1px solid rgba(230,51,18,0.3); }
    .bubble.user a { color: white; border-color: rgba(255,255,255,0.5); }
    .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 13px 16px; }
    .typing-dot { width: 7px; height: 7px; background: var(--gray); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .suggestions { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
    .chip { background: var(--white); border: 1.5px solid var(--border); color: var(--dark); font-size: 12.5px; font-family: 'Outfit',sans-serif; font-weight: 500; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .chip:hover { border-color: var(--red); color: var(--red); background: #fff5f4; }
    .input-area { background: var(--white); border-top: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .input-wrap { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; display: flex; align-items: center; padding: 0 14px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--red); }
    textarea { flex: 1; background: transparent; border: none; outline: none; font-family: 'Outfit',sans-serif; font-size: 14px; color: var(--dark); resize: none; padding: 12px 0; max-height: 100px; line-height: 1.4; }
    textarea::placeholder { color: #b0b5be; }
    .send-btn { width: 42px; height: 42px; background: var(--red); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; }
    .send-btn:hover { background: var(--red-dark); transform: scale(1.05); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .footer-note { text-align: center; font-size: 11px; color: #b0b5be; padding: 4px 16px 10px; flex-shrink: 0; }
    .footer-note a { color: var(--red); text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-avatar">🤝</div>
    <div class="header-info">
      <div class="header-name">Assistant FBKConseils</div>
      <div class="header-sub"><span class="online-dot"></span> En ligne — Répond instantanément</div>
    </div>
    <div class="header-logo">FBK</div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="sendChip(this)">📋 Déclaration d'impôt</button>
    <button class="chip" onclick="sendChip(this)">🏠 Dossier hypothécaire</button>
    <button class="chip" onclick="sendChip(this)">👴 Retrait 2ème pilier</button>
    <button class="chip" onclick="sendChip(this)">🌍 Frontaliers</button>
    <button class="chip" onclick="sendChip(this)">📞 Prendre RDV</button>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Posez votre question..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">Propulsé par <a href="https://fbk-conseils.ch" target="_blank">FBKConseils</a> · Fiduciaire & conseils en Suisse romande</div>
  <script>
    const API_URL = '/api/chat';
    const conversationHistory = [];
    let isLoading = false;
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    function formatMessage(text) {
      let html = text.replace(/\[LINK\]\{([^}]+)\}\{([^}]+)\}/g, '<a href="$1" target="_blank">$2</a>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }
    function addMessage(role, text) {
      const row = document.createElement('div'); row.className = 'msg-row ' + role;
      const avatar = document.createElement('div'); avatar.className = 'msg-avatar' + (role === 'user' ? ' user-av' : ''); avatar.textContent = role === 'user' ? 'Vous' : '🤝';
      const bubble = document.createElement('div'); bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot'); bubble.innerHTML = formatMessage(text);
      row.appendChild(avatar); row.appendChild(bubble); messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function showTyping() {
      const row = document.createElement('div'); row.className = 'msg-row'; row.id = 'typing-row';
      const avatar = document.createElement('div'); avatar.className = 'msg-avatar'; avatar.textContent = '🤝';
      const bubble = document.createElement('div'); bubble.className = 'bubble bot';
      bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      row.appendChild(avatar); row.appendChild(bubble); messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function hideTyping() { const t = document.getElementById('typing-row'); if (t) t.remove(); }
    function sendMessage(text) {
      const message = (text || userInput.value).trim();
      if (!message || isLoading) return;
      document.getElementById('suggestions').style.display = 'none';
      userInput.value = ''; autoResize(userInput);
      isLoading = true; sendBtn.disabled = true;
      addMessage('user', message);
      conversationHistory.push({ role: 'user', content: message });
      showTyping();
      fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: conversationHistory }) })
        .then(r => r.json()).then(data => {
          hideTyping();
          if (data.error) throw new Error(data.error);
          conversationHistory.push({ role: 'assistant', content: data.content });
          addMessage('assistant', data.content);
        }).catch(err => { hideTyping(); addMessage('assistant', 'Désolé, une erreur est survenue. Contactez-nous sur [LINK]{https://fbk-conseils.ch/nous-contacter/}{fbk-conseils.ch}'); })
        .finally(() => { isLoading = false; sendBtn.disabled = false; userInput.focus(); });
    }
    function sendChip(btn) { sendMessage(btn.textContent.replace(/^\S+ /, '').trim()); }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
    window.addEventListener('load', () => {
      setTimeout(() => { addMessage('assistant', 'Bonjour ! 👋 Je suis l\'assistant de **FBKConseils**.\n\nComment puis-je vous aider aujourd\'hui ? Impôts, retraite, immobilier, assurances...'); }, 300);
    });
  </script>
</body>
</html>
